components:
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [member, admin] }
    Category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
    SkillItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        categoryId: { type: string }
        tags: { type: array, items: { type: string } }
        content: { type: string }
        useCase: { type: string }
        exampleInput: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Favorite:
      type: object
      properties:
        userId: { type: string }
        skillId: { type: string }
        createdAt: { type: string, format: date-time }
    ErrorResponse:
      type: object
      properties:
        message: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
